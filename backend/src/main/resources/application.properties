spring.application.name=house

server.port=${SERVER_PORT}

# PostgreSQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# MQTT
mqtt.broker=${MQTT_BROKER}
mqtt.client-id=${MQTT_CLIENT_ID}
mqtt.topic=${MQTT_TOPICS:greenhouse/sensor/register,greenhouse/sensor/data}

sensor.online.timeout.minutes=${SENSOR_ONLINE_TIMEOUT_MINUTES}

logging.level.org.springframework.web.socket=TRACE
logging.level.org.springframework.web.socket.config=TRACE
logging.level.org.springframework.messaging=TRACE