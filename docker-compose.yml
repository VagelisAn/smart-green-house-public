
services:

  # 📡 MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  # 🐘 PostgreSQL
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: iotdb
      POSTGRES_USER: iotuser
      POSTGRES_PASSWORD: iotpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ☕ Spring Boot Backend (prebuilt jar)
  backend:
    image: openjdk:21
    container_name: spring-backend
    working_dir: /app
    volumes:
      - ./backend/app.jar:/app/app.jar
    env_file:
      - .env
    command: ["java", "-jar", "app.jar"]
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - mosquitto
#    environment:
#      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/iotdb
#      SPRING_DATASOURCE_USERNAME: iotuser
#      SPRING_DATASOURCE_PASSWORD: iotpass
#      MQTT_BROKER: tcp://mosquitto:1883

  # 🌐 Angular Frontend (prebuilt dist)
  frontend:
    image: nginx:alpine
    container_name: frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  pgdata: 